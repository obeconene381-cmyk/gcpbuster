name: Google Skills Automation

on:
  workflow_dispatch:

jobs:
  run-automation:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Requirements
        run: |
          pip install playwright requests
          playwright install firefox --with-deps

      - name: Download Buster Extension
        run: |
          if [ ! -f "buster-main.zip" ]; then
            wget -q -O buster-main.zip https://github.com/dessant/buster/archive/refs/heads/main.zip
          fi

      - name: Run Playwright Script
        run: python main.py
