name: Google Skills Automation
on:
  workflow_dispatch:

jobs:
  run-automation:
    runs-on: ubuntu-latest
    timeout-minutes: 20              # زيادة المهلة الإجمالية
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libnss3 libatk-bridge2.0-0 libdrm2 libxkbcommon0 libgbm1 libasound2
          pip install playwright requests
          python -m playwright install chromium --with-deps

      - name: Run Playwright with Xvfb
        run: |
          # تشغيل السكريبت باستخدام xvfb-run (يُشغل خادم X وهمي تلقائياً)
          xvfb-run -a --server-args="-screen 0 1280x720x24" python main.py
