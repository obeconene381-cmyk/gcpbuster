name: Google Skills Automation

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  run-automation:
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update --fix-missing || true
          sudo apt-get install -y --no-install-recommends \
            libnss3 libatk-bridge2.0-0 libxss1 libgtk-3-0 \
            libgbm1 libasound2 libxshmfence1 libx11-xcb1 \
            libxcomposite1 libxcursor1 libxdamage1 libxi6 \
            libxtst6 libappindicator3-1 libxrandr2 fonts-liberation wget unzip
          sudo apt-get clean

      - name: Install Python Packages
        run: |
          pip install --upgrade pip
          pip install playwright requests

      - name: Install Playwright Chromium
        run: |
          python -m playwright install chromium

      - name: Download & Extract Buster
        run: |
          wget -q -O buster.zip https://github.com/dessant/buster/archive/refs/heads/master.zip
          unzip -q buster.zip  # ✅ فك في المجلد الحالي (ينتج buster-master/)
          ls -la buster-master/  # التحقق

      - name: Run Automation Script
        run: python main.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results
          path: "*.png"
          retention-days: 7
